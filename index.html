<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Golf Leaderboard</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0B0F14;
  color:#E5E7EB;
}

.header {
  text-align:center;
  padding:12px;
  border-bottom:1px solid #1F2933;
  font-size:14px;
}

.table {
  width:100%;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  text-align:center;
  border-bottom:1px solid #1F2933;
}

.rank { color:#22c55e; font-weight:bold; }
.wd { color:red; }
.flag { font-size:12px; color:#9CA3AF; }

#loading {
  text-align:center;
  padding:30px;
  font-size:14px;
}

.error {
  color:#ef4444;
}
</style>
</head>

<body>

<div class="header">
  🏆 TIS Friendly Golf Competition
</div>

<div id="loading">⏳ Loading...</div>

<table class="table" id="table" style="display:none;">
  <thead>
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Net</th>
      <th>To Par</th>
      <th>Holes</th>
      <th>Flags</th>
    </tr>
  </thead>
  <tbody id="body"></tbody>
</table>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzpEvE0ayKwOyMkQ3qcYB_XxP3qxSiaDb-ERVfBjP1YyxpEC8GQ-uyZF5bJKkzxR8Sc/exec";

/******** โหลดข้อมูล ********/
async function loadData() {
  try {
    const res = await fetch(API_URL);

    if (!res.ok) throw new Error("HTTP " + res.status);

    const data = await res.json();

    if (!Array.isArray(data)) throw new Error("Invalid JSON");

    render(data);

    document.getElementById("loading").style.display = "none";
    document.getElementById("table").style.display = "table";

  } catch (err) {
    console.error("LOAD ERROR:", err);

    document.getElementById("loading").innerHTML =
      "<div class='error'>❌ โหลดข้อมูลไม่สำเร็จ</div>";
  }
}

/******** render table ********/
function render(data) {
  const tbody = document.getElementById("body");
  tbody.innerHTML = "";

  data.forEach((p, i) => {

    let flags = "";
    if (p.WD) flags += "WD ";
    if (p.LGG) flags += "LGG ";
    if (p.LNO) flags += "LNO ";

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="rank">${i+1}</td>
      <td>${p.Name || "-"}</td>
      <td>${p.Net ?? "-"}</td>
      <td>${p.ToPar ?? "-"}</td>
      <td>${p.holes ?? "-"}</td>
      <td class="flag">${flags}</td>
    `;

    if (p.WD) tr.classList.add("wd");

    tbody.appendChild(tr);
  });
}

/******** auto refresh ********/
loadData();
setInterval(loadData, 10000); // รีเฟรชทุก 10 วิ

</script>

</body>
</html>
