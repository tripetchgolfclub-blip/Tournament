<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Golf Leaderboard</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0B0F14;
  color:#E5E7EB;
}

.header {
  text-align:center;
  padding:10px;
  border-bottom:1px solid #1F2933;
}

.table {
  width:100%;
  border-collapse: collapse;
}

th, td {
  padding:8px;
  text-align:center;
  border-bottom:1px solid #1F2933;
}

.rank { color:#22c55e; font-weight:bold; }
.wd { color:red; }
.flag { font-size:12px; }
</style>
</head>

<body>

<div class="header">
  🏆 TIS Friendly Golf Competition
</div>

<div id="loading" style="text-align:center;padding:20px;">
  ⏳ Loading...
</div>

<table class="table" id="table" style="display:none;">
  <thead>
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Net</th>
      <th>To Par</th>
      <th>Holes</th>
      <th>Flags</th>
    </tr>
  </thead>
  <tbody id="body"></tbody>
</table>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzpEvE0ayKwOyMkQ3qcYB_XxP3qxSiaDb-ERVfBjP1YyxpEC8GQ-uyZF5bJKkzxR8Sc/exec"; // 👈 ใส่ของคุณ

function loadData() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {
      render(data);
      document.getElementById("loading").style.display = "none";
      document.getElementById("table").style.display = "table";
    })
    .catch(err => {
      console.error(err);
      document.getElementById("loading").innerHTML = "❌ Load failed";
    });
}

function render(data) {
  const tbody = document.getElementById("body");
  tbody.innerHTML = "";

  data.forEach((p, i) => {

    let flags = "";
    if (p.WD) flags += "WD ";
    if (p.LGG) flags += "LGG ";
    if (p.LNO) flags += "LNO ";

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="rank">${i+1}</td>
      <td>${p.Name || "-"}</td>
      <td>${p.Net}</td>
      <td>${p.ToPar}</td>
      <td>${p.holes}</td>
      <td class="flag">${flags}</td>
    `;

    if (p.WD) tr.classList.add("wd");

    tbody.appendChild(tr);
  });
}

loadData();

</script>

</body>
</html>
